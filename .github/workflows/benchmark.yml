name: Benchmark

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  deployments: write
  contents: write
  pull-requests: write

jobs:
  benchmark:
    uses: gofiber/.github/.github/workflows/benchmark.yml@main
    with:
      # pushes are rare here; the cap mainly bounds the data file size
      max-items-in-chart: 60
