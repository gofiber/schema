name: After Release

on:
  release:
    types: [published]
  repository_dispatch:
    types: [after-release]
  workflow_dispatch:

jobs:
  notify:
    uses: gofiber/.github/.github/workflows/after-release.yml@main
    with:
      repos: |
        - gofiber/fiber
    secrets:
      dispatch-token: ${{ secrets.DISPATCH_TOKEN }}
